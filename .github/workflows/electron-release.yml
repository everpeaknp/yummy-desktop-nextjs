# Build Yummy POS Windows installers and attach them to a GitHub Release.
#
# Create a release:
#   git tag v0.1.3
#   git push origin v0.1.3
#
# Or: Actions → Electron Release → Run workflow (creates/updates the tag's release assets).

name: Electron Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.3)"
        required: true
        default: "v0.1.3"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Clean dist
        shell: pwsh
        run: |
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }

      - name: Build Windows installers
        shell: pwsh
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          # Org/repo secrets sometimes set signing vars; clear them for unsigned CI builds.
          Remove-Item Env:CSC_LINK -ErrorAction SilentlyContinue
          Remove-Item Env:CSC_KEY_PASSWORD -ErrorAction SilentlyContinue
          Remove-Item Env:WIN_CSC_LINK -ErrorAction SilentlyContinue
          Remove-Item Env:WIN_CSC_KEY_PASSWORD -ErrorAction SilentlyContinue

          npm run electron:build:win -- --publish never 2>&1 | Tee-Object -FilePath electron-build.log
          if ($LASTEXITCODE -ne 0) {
            Get-Content electron-build.log -Tail 200
            exit $LASTEXITCODE
          }

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: electron-build-log
          path: electron-build.log

      - name: List build artifacts
        shell: pwsh
        run: Get-ChildItem -Path dist -Recurse -Filter *.exe | Format-Table FullName, Length

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: Yummy POS ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
