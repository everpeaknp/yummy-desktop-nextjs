# Build Yummy POS Windows installers, publish to GitHub Releases, and generate
# latest.yml for electron-updater auto-updates (NSIS installs only).
#
# Release (recommended):
#   1. Bump "version" in package.json
#   2. git tag v0.1.5 && git push origin v0.1.5
#
# Manual run: set "ref" to an existing branch (e.g. main) or tag (e.g. v0.1.5).

name: Electron Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to build (must exist on remote, e.g. main or v0.1.5)"
        required: true
        default: "main"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Clean dist
        shell: pwsh
        run: |
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }

      - name: Build and publish to GitHub Releases
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Remove-Item Env:CSC_LINK -ErrorAction SilentlyContinue
          Remove-Item Env:CSC_KEY_PASSWORD -ErrorAction SilentlyContinue
          Remove-Item Env:WIN_CSC_LINK -ErrorAction SilentlyContinue
          Remove-Item Env:WIN_CSC_KEY_PASSWORD -ErrorAction SilentlyContinue

          npm run electron:build:win -- --publish always 2>&1 | Tee-Object -FilePath electron-build.log
          if ($LASTEXITCODE -ne 0) {
            Get-Content electron-build.log -Tail 200
            exit $LASTEXITCODE
          }

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: electron-build-log
          path: electron-build.log

      - name: List build artifacts
        shell: pwsh
        run: Get-ChildItem -Path dist -Recurse | Format-Table FullName, Length
